# GitHub New Repos 源
# 使用 GitHub Search API 获取新创建的仓库

name: GitHub New Repos
type: api
enabled: true

url: "https://api.github.com/search/repositories"
method: GET

# 请求参数 - 使用 {today} 占位符会被自动替换
params:
  q: "stars:>50 created:>{week_ago}"
  sort: "stars"
  order: "desc"
  per_page: 20

# JSON 路径
path: "items"

# 字段映射
fields:
  title: "full_name"
  url: "html_url"
  description: "description"
  score: "stargazers_count"

# 热度标签
metric_label: "⭐"

# 每源条数
limit: 10

# 去重天数
dedup_days: 7

# 同 URL 时保留更高 score（与 GitHub Trending 合并去重）
url_dedup: true

# 采集频率
frequency: weekly
day: friday
